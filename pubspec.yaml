name: liaoya_app
description: "洽聊 - 即时通讯App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 状态管理
  provider: ^6.1.2
  # HTTP
  dio: ^5.4.3
  # WebSocket
  web_socket_channel: ^3.0.1
  # 本地存储
  shared_preferences: ^2.2.3
  # 路由
  go_router: ^14.2.0
  # 图片缓存
  cached_network_image: ^3.3.1
  # 图片选择
  image_picker: ^1.0.7
  # 文件选择
  file_picker: ^8.0.0
  # 权限
  permission_handler: ^11.3.0
  # JSON 序列化
  json_annotation: ^4.8.1
  # 时间格式化
  intl: ^0.19.0
  # 下拉刷新
  pull_to_refresh: ^2.0.0
  # 图片查看器
  photo_view: ^0.15.0
  # 录音
  record: ^5.1.0
  # 音频播放
  audioplayers: ^6.0.0
  # 视频播放
  video_player: ^2.8.6
  # URL 启动
  url_launcher: ^6.2.5
  # HTML 渲染
  flutter_widget_from_html_core: ^0.15.2
  # Badge
  badges: ^3.1.2
  # shimmer loading
  shimmer: ^3.0.0
  # 现代图标
  iconsax_flutter: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
